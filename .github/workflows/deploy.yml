name: Deploy to VPS

# Auto-deploy the Atelier studio app to the VPS on every push to main.
# Only code files are shipped (tar over SSH) — server state on the VPS is never
# touched: .env, users.json, .secret, notes.json, ig_cookies.txt, caches, frames/.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   VPS_SSH_KEY  — the private deploy key (full PEM, multi-line)
#   VPS_HOST     — e.g. 192.3.81.151
#   VPS_USER     — root
#   VPS_PORT     — 22  (optional; defaults to 22)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # strip any stray whitespace/newlines that got pasted into the secrets
          HOST="$(printf '%s' "$VPS_HOST" | tr -d '[:space:]')"
          PORT="$(printf '%s' "$VPS_PORT" | tr -d '[:space:]')"; PORT="${PORT:-22}"
          ssh-keyscan -p "$PORT" "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy code + restart service
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          HOST="$(printf '%s' "$VPS_HOST" | tr -d '[:space:]')"
          USER="$(printf '%s' "$VPS_USER" | tr -d '[:space:]')"
          PORT="$(printf '%s' "$VPS_PORT" | tr -d '[:space:]')"; PORT="${PORT:-22}"
          cd runpod-comfyui
          tar czf - \
            comfy_common.py workflow_i2i.json workflow_t2i.json \
            webapp/app.py webapp/r2_store.py webapp/index.html webapp/login.html \
          | ssh -i ~/.ssh/deploy_key -p "$PORT" \
              -o StrictHostKeyChecking=accept-new \
              "$USER@$HOST" \
              "tar xzf - -C /root/atelier && systemctl restart atelier && echo 'deployed + atelier restarted'"
