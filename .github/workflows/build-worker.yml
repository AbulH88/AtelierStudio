# Build the RunPod serverless worker image and push to Docker Hub.
# Runs on GitHub's runners (no local Docker needed). Trigger manually from the
# Actions tab, or it auto-runs when the worker files change.
name: Build RunPod worker

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "runpod-comfyui/Dockerfile"
      - "runpod-comfyui/start.sh"
      - "runpod-comfyui/handler.py"
      - "runpod-comfyui/comfy_common.py"
      - "runpod-comfyui/workflow_*.json"
      - ".github/workflows/build-worker.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The CUDA + PyTorch + ComfyUI image is large; free up runner disk first.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune --all --force
          df -h

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: runpod-comfyui
          file: runpod-comfyui/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/atelier-comfy-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/atelier-comfy-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
