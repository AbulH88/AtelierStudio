<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atelier — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Hanken+Grotesque:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--ink:#0c0c0e;--panel:#15151b;--ink2:#121217;--line:#2a2a33;--line2:#36363f;
  --txt:#ece7df;--mut:#8d8a83;--faint:#5c5a55;--amber:#e9b864;--amber-dim:#b78c3f;--rose:#d98b7a;--good:#7fc8a0;
  --serif:"Fraunces",Georgia,serif;--sans:"Hanken Grotesque",sans-serif;--mono:"JetBrains Mono",monospace;}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:var(--ink);color:var(--txt);font-family:var(--sans);
  display:grid;place-items:center;padding:24px;
  background-image:radial-gradient(800px 460px at 70% -10%,rgba(233,184,100,.10),transparent 60%),
    radial-gradient(640px 520px at 0% 100%,rgba(217,139,122,.07),transparent 55%);}
.card{width:100%;max-width:380px;background:linear-gradient(180deg,var(--panel),var(--ink2));
  border:1px solid var(--line);border-radius:18px;padding:30px;box-shadow:0 24px 60px -24px #000}
.mark{width:34px;height:34px;border-radius:9px;border:1px solid var(--amber-dim);display:grid;place-items:center;
  color:var(--amber);font-family:var(--serif);font-size:20px;box-shadow:inset 0 0 14px rgba(233,184,100,.18)}
h1{font-family:var(--serif);font-weight:500;font-size:24px;margin:16px 0 2px}
.sub{color:var(--faint);font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:22px}
.tabs{display:flex;gap:4px;background:var(--ink2);border:1px solid var(--line);border-radius:999px;padding:4px;margin-bottom:20px}
.tabs button{flex:1;background:transparent;border:0;color:var(--mut);padding:9px;border-radius:999px;cursor:pointer;font-family:var(--sans);font-size:14px}
.tabs button.on{background:#23222a;color:var(--txt)}
label{display:block;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--mut);margin:14px 0 6px}
input{width:100%;background:var(--ink2);border:1px solid var(--line);color:var(--txt);border-radius:10px;
  padding:12px 13px;font-family:var(--sans);font-size:15px}
input:focus{outline:none;border-color:var(--amber-dim);box-shadow:0 0 0 3px rgba(233,184,100,.10)}
button.go{width:100%;margin-top:22px;padding:13px;border:0;border-radius:11px;cursor:pointer;
  font-family:var(--serif);font-size:16px;color:var(--ink);background:linear-gradient(180deg,#f0c878,var(--amber));
  box-shadow:0 10px 24px -12px var(--amber-dim)}
button.go:hover{filter:brightness(1.06)}
button.go:disabled{opacity:.6;cursor:wait}
.msg{margin-top:14px;font-size:13px;font-family:var(--mono);min-height:18px}
.msg.err{color:var(--rose)}.msg.ok{color:var(--good)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid #0006;border-top-color:var(--ink);
  border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px;margin-right:7px}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="mark">A</div>
  <h1>Atelier <span style="color:var(--amber);font-style:italic">Studio</span></h1>
  <div class="sub">character forge</div>

  <div class="tabs">
    <button id="tabLogin" class="on">Sign in</button>
    <button id="tabSignup">Request access</button>
  </div>

  <label>Username</label>
  <input id="u" autocomplete="username" autocapitalize="none" spellcheck="false">
  <label>Password</label>
  <input id="p" type="password" autocomplete="current-password">
  <button class="go" id="go">Sign in</button>
  <div class="msg" id="msg"></div>
</div>

<script>
const $=s=>document.querySelector(s);
let mode="login";
function setMode(m){mode=m;
  $('#tabLogin').classList.toggle('on',m==='login');
  $('#tabSignup').classList.toggle('on',m==='signup');
  $('#go').textContent=m==='login'?'Sign in':'Request access';
  $('#p').autocomplete=m==='login'?'current-password':'new-password';
  $('#msg').textContent='';$('#msg').className='msg';}
$('#tabLogin').onclick=()=>setMode('login');
$('#tabSignup').onclick=()=>setMode('signup');

async function submit(){
  const username=$('#u').value.trim(), password=$('#p').value;
  if(!username||!password){$('#msg').className='msg err';$('#msg').textContent='Enter username and password.';return;}
  $('#go').disabled=true;const t=$('#go').textContent;$('#go').innerHTML='<span class="spin"></span>';
  try{
    const r=await fetch('/api/'+(mode==='login'?'login':'signup'),{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const d=await r.json();
    if(d.error){$('#msg').className='msg err';$('#msg').textContent=d.error;return;}
    if(mode==='login'){location.href='/';return;}
    // signup
    $('#msg').className='msg ok';
    $('#msg').textContent=d.first?'Admin account created — signing you in…':'Request sent. An admin must approve your account.';
    if(d.first){setTimeout(()=>location.href='/',900);} else {setMode('login');$('#go').textContent='Sign in';}
  }catch(e){$('#msg').className='msg err';$('#msg').textContent=String(e);}
  finally{$('#go').disabled=false;$('#go').textContent=t;}
}
$('#go').onclick=submit;
$('#p').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
</script>
</body>
</html>
